stages:
  - build
  - test
  - publish

variables:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

default:
  image: mcr.microsoft.com/dotnet/sdk:10.0

build:
  stage: build
  script:
    - dotnet restore CaesarCipher.sln
    - dotnet build CaesarCipher.sln --configuration Release --no-restore
  artifacts:
    paths:
      - bin/
      - obj/
      - CaesarCipherTests/bin/
      - CaesarCipherTests/obj/
    expire_in: 1 hour

test:
  stage: test
  needs:
    - job: build
      artifacts: true
  script:
    - dotnet test CaesarCipher.sln --configuration Release --no-build --logger "junit;LogFilePath=$CI_PROJECT_DIR/test-results.xml"
  artifacts:
    when: always
    reports:
      junit: test-results.xml

publish:
  stage: publish
  needs: [test]
  script:
    - dotnet publish CaesarCipher.csproj --configuration Release --runtime linux-x64 --self-contained true --output artifacts/
  artifacts:
    name: "caesarcipher-$CI_COMMIT_SHORT_SHA"
    paths:
      - artifacts/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
